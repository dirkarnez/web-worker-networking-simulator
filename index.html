        const btnExecute = document.getElementById("btn-execute");
        btnExecute.addEventListener("click", function() {
            let log = Array.from({length: 10}).map((_, i) => ({timestamp: i}));
            
            const addToTimestamp = ({name, timestamp, message}) => {
                debugger;
                log = log.map(item => {
                    if (item.timestamp == timestamp) {
                        const exists = (item.workers || []).findIndex(worker => worker.name == name) > -1;
                        return ({
                            ...item,
                            workers: exists ? item.workers.map(worker => {
                                if (worker.name == name) {
                                    return ({
                                        ...worker,
                                        message: message
                                    })
                                } else {
                                    worker;
                                }
                            }) : [...(item.workers || []), { name: name }]
                        });
                    } else {
                        return item;
                    }
                })
                
                console.log(`${JSON.stringify(log)}`);
            }

            const workers = Array.from({length: 10})
            .map((_, i) => {
                const worker = new Worker("./worker.js", { name: `worker_${i}` });
                worker.addEventListener("message", (e) => addToTimestamp(e.data));
                return worker;
            });

            log.forEach((e) => {
                workers.forEach(worker => {
                    worker.postMessage(e.timestamp);
                });
            });
        });
    </script>
